name: Python Doctor

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  python-doctor:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python Doctor
        run: python -m pip install .

      - name: Scan repository
        run: >-
          python-doctor scan .
          --format github
          --require-complete
          --blocking error
